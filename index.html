
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Stream Player - Clean Version</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        header {
            text-align: center;
            padding: 2rem 1rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--accent);
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .video-wrapper {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        video {
            width: 100%;
            display: block;
            border-radius: 12px;
            outline: none;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 640px) {
            header h1 { font-size: 1.25rem; }
            .container { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <header>
        <script async="async" data-cfasync="false" src="https://hypothesisgarden.com/c41a23ff90a4cb9a439bd54b5d951bc3/invoke.js"></script>
<div id="container-c41a23ff90a4cb9a439bd54b5d951bc3"></div>
    </header>

    <div class="container">
        <div class="video-wrapper">
            <!-- Video Player -->
            <video 
                controls 
                autoplay 
                playsinline 
                controlslist="nodownload" 
                disablepictureinpicture 
                preload="metadata">
                <source src="https://cdn2.videy.co/twIzrMdU1.mp4" type="video/mp4">
                Browser Anda tidak mendukung pemutar video.
            </video>
        </div>
    </div>


    <script>
        // Proteksi klik kanan dan tombol F12 (Opsional, tetap dipertahankan)
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        document.addEventListener('keydown', function (e) {
            if (e.key === "F12") e.preventDefault();
            if (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) e.preventDefault();
            if (e.ctrlKey && ["U","S"].includes(e.key.toUpperCase())) e.preventDefault();
        });

        // Mencegah fullscreen jika diperlukan sesuai request sebelumnya
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        });
    </script>
